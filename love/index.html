<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zoe, which one do you LOVE more?</title>
  <style>
    :root {
      --ink: #2a1418;
      --rose: #ff4f7b;
      --rose-dark: #b31243;
      --cream: #fff6ef;
      --gold: #f5c66a;
      --shadow: 0 28px 80px rgba(80, 20, 38, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 158, 178, 0.58), transparent 28rem),
        radial-gradient(circle at 88% 12%, rgba(245, 198, 106, 0.42), transparent 24rem),
        linear-gradient(145deg, #fff9f4 0%, #ffe0e7 43%, #f7b6c6 100%);
      font-family: Georgia, "Times New Roman", serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      content: "";
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.35), transparent 72%);
    }

    .page {
      width: min(1120px, 100%);
      min-height: 100vh;
      padding: clamp(24px, 4vw, 52px);
      display: grid;
      align-content: center;
      gap: clamp(24px, 4vw, 46px);
    }

    .question {
      max-width: 980px;
      margin: 0 auto;
      text-align: center;
    }

    .kicker {
      margin: 0 0 12px;
      color: var(--rose-dark);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: clamp(0.72rem, 1.4vw, 0.9rem);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 7vw, 5.8rem);
      font-weight: 700;
      line-height: 0.96;
      text-wrap: balance;
    }

    .love-word {
      color: var(--rose-dark);
      font-style: italic;
      text-shadow: 0 6px 0 rgba(255, 255, 255, 0.5);
    }

    .stage {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(18px, 5vw, 62px);
      align-items: center;
      width: min(900px, 100%);
      min-height: clamp(360px, 52vw, 500px);
      margin: 0 auto;
      padding: clamp(8px, 2vw, 18px);
    }

    .choice {
      appearance: none;
      position: relative;
      display: grid;
      min-width: 0;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      transform: translate3d(var(--x, 0), var(--y, 0), 0) rotate(var(--r, 0deg)) scale(var(--s, 1));
      transition: transform 260ms cubic-bezier(0.22, 1.35, 0.36, 1), filter 220ms ease;
    }

    .choice::before {
      position: absolute;
      inset: -12px;
      z-index: -1;
      border-radius: 26px;
      content: "";
      background: rgba(255, 255, 255, 0.66);
      box-shadow: var(--shadow);
      transform: rotate(-2deg);
    }

    .choice img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border: 8px solid #fffaf7;
      border-radius: 20px;
      box-shadow: inset 0 0 0 1px rgba(42, 20, 24, 0.08);
      user-select: none;
      -webkit-user-drag: none;
    }

    .choice-him {
      --s: 1.04;
      filter: saturate(1.08) contrast(1.03);
    }

    .choice-him::after {
      position: absolute;
      right: -18px;
      bottom: 18px;
      width: 84px;
      height: 84px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      content: "\2665";
      color: #fff;
      background: linear-gradient(145deg, var(--rose), var(--rose-dark));
      box-shadow: 0 16px 38px rgba(179, 18, 67, 0.32);
      font-size: 2.7rem;
      line-height: 1;
      transform: rotate(12deg);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .choice-him:hover,
    .choice-him:focus-visible {
      --s: 1.11;
      filter: saturate(1.18) contrast(1.06);
      outline: none;
    }

    .choice-her {
      --r: 2deg;
      filter: saturate(0.88) contrast(0.94);
    }

    .choice-her:hover,
    .choice-her:focus-visible {
      outline: none;
    }

    .nudge {
      min-height: 1.5em;
      margin: -8px auto 0;
      color: var(--rose-dark);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      font-weight: 700;
      text-align: center;
    }

    .result {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
      opacity: 0;
      background: rgba(255, 246, 239, 0.72);
      backdrop-filter: blur(10px);
      transition: opacity 300ms ease;
    }

    .result.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .result-panel {
      width: min(620px, 100%);
      padding: clamp(26px, 6vw, 52px);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 24px;
      color: #fff;
      text-align: center;
      background:
        linear-gradient(145deg, rgba(179, 18, 67, 0.94), rgba(255, 79, 123, 0.9)),
        var(--rose-dark);
      box-shadow: 0 30px 90px rgba(80, 20, 38, 0.34);
      transform: translateY(16px) scale(0.96);
      transition: transform 420ms cubic-bezier(0.22, 1.35, 0.36, 1);
    }

    .result.is-visible .result-panel {
      transform: translateY(0) scale(1);
    }

    .result-title {
      margin: 0;
      font-size: clamp(2.2rem, 9vw, 5.3rem);
      line-height: 0.95;
    }

    .result-copy {
      margin: 18px 0 0;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: clamp(1rem, 2.8vw, 1.3rem);
      line-height: 1.55;
    }

    .confetti {
      position: fixed;
      top: -16px;
      left: var(--left);
      z-index: 11;
      width: 12px;
      height: 18px;
      border-radius: 4px;
      pointer-events: none;
      background: var(--color);
      transform: rotate(var(--spin));
      animation: fall var(--speed) linear forwards;
    }

    @keyframes pulse {
      0%,
      100% {
        transform: rotate(12deg) scale(1);
      }

      50% {
        transform: rotate(12deg) scale(1.12);
      }
    }

    @keyframes fall {
      to {
        transform: translate3d(var(--drift), 110vh, 0) rotate(calc(var(--spin) + 540deg));
        opacity: 0.92;
      }
    }

    @media (max-width: 720px) {
      .page {
        min-height: 100svh;
        padding: 22px 18px 30px;
        align-content: start;
      }

      .stage {
        grid-template-columns: 1fr;
        min-height: 0;
        gap: 26px;
      }

      .choice {
        width: min(330px, 86vw);
        justify-self: center;
      }

      .choice-him {
        order: 1;
      }

      .choice-her {
        order: 2;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
<meta name="generator" content="Hexo 4.2.1"></head>
<body>
  <main class="page" aria-live="polite">
    <section class="question">
      <p class="kicker">A very serious question</p>
      <h1>Zoe, which one do you <span class="love-word">LOVE</span> more?</h1>
    </section>

    <section class="stage" aria-label="Choose one photo">
      <button class="choice choice-him" type="button" data-choice="him" aria-label="Choose him">
        <img src="/love/choice-him.jpg" alt="Smiling man making a heart gesture">
      </button>
      <button class="choice choice-her" type="button" data-choice="her" aria-label="Choose her">
        <img src="/love/choice-her.jpg" alt="Woman in profile wearing pearls">
      </button>
    </section>

    <p class="nudge" id="nudge">Choose carefully. The universe is watching.</p>
  </main>

  <div class="result" id="result" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="result-panel">
      <p class="result-title">Correct.</p>
      <p class="result-copy">Zoe chose LOVE. Obviously, scientifically, permanently.</p>
    </div>
  </div>

  <script>
    const him = document.querySelector('[data-choice="him"]');
    const her = document.querySelector('[data-choice="her"]');
    const nudge = document.getElementById('nudge');
    const result = document.getElementById('result');
    const nudges = [
      'Are you sure? Look at the tiny heart.',
      'The correct answer is getting brighter.',
      'Try again, but with your heart this time.',
      'This button is emotionally unavailable.',
      'One more hint: he is literally glowing.'
    ];
    let wrongAttempts = 0;

    function setHerPosition(multiplier = 1) {
      const maxX = Math.min(window.innerWidth * 0.22, 130) * multiplier;
      const maxY = Math.min(window.innerHeight * 0.12, 86) * multiplier;
      const direction = Math.random() > 0.5 ? 1 : -1;
      const x = (40 + Math.random() * maxX) * direction;
      const y = (10 + Math.random() * maxY) * (Math.random() > 0.5 ? 1 : -1);
      const r = -10 + Math.random() * 20;
      const s = Math.max(0.72, 0.96 - wrongAttempts * 0.045);

      her.style.setProperty('--x', `${x}px`);
      her.style.setProperty('--y', `${y}px`);
      her.style.setProperty('--r', `${r}deg`);
      her.style.setProperty('--s', s);
    }

    function rewardHim() {
      const scale = Math.min(1.24, 1.07 + wrongAttempts * 0.035);
      him.style.setProperty('--s', scale);
      him.animate(
        [
          { transform: 'translate3d(0, 0, 0) rotate(0deg) scale(' + scale + ')' },
          { transform: 'translate3d(0, -12px, 0) rotate(-2deg) scale(' + (scale + 0.05) + ')' },
          { transform: 'translate3d(0, 0, 0) rotate(0deg) scale(' + scale + ')' }
        ],
        { duration: 520, easing: 'cubic-bezier(.22, 1.35, .36, 1)' }
      );
    }

    function wrongChoice(event) {
      event.preventDefault();
      wrongAttempts += 1;
      nudge.textContent = nudges[Math.min(wrongAttempts - 1, nudges.length - 1)];
      setHerPosition(wrongAttempts > 2 ? 1.3 : 1);
      rewardHim();
    }

    function showConfetti() {
      const colors = ['#ff4f7b', '#b31243', '#f5c66a', '#ffffff', '#2a1418'];

      for (let i = 0; i < 90; i += 1) {
        const piece = document.createElement('span');
        piece.className = 'confetti';
        piece.style.setProperty('--left', `${Math.random() * 100}%`);
        piece.style.setProperty('--color', colors[i % colors.length]);
        piece.style.setProperty('--spin', `${Math.random() * 360}deg`);
        piece.style.setProperty('--drift', `${-80 + Math.random() * 160}px`);
        piece.style.setProperty('--speed', `${2.1 + Math.random() * 1.7}s`);
        document.body.appendChild(piece);
        piece.addEventListener('animationend', () => piece.remove());
      }
    }

    function correctChoice() {
      result.classList.add('is-visible');
      result.setAttribute('aria-hidden', 'false');
      nudge.textContent = 'That is the only acceptable answer.';
      showConfetti();
    }

    her.addEventListener('pointerenter', () => setHerPosition());
    her.addEventListener('pointerdown', wrongChoice);
    her.addEventListener('click', (event) => {
      if (event.detail === 0) {
        wrongChoice(event);
      }
    });
    him.addEventListener('click', correctChoice);
    result.addEventListener('click', () => {
      result.classList.remove('is-visible');
      result.setAttribute('aria-hidden', 'true');
    });
  </script>
</body>
</html>
